<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.bunny.net/css?family=space-grotesk:400,700" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          // This maps to class="font-sparkle"
          sparkle: ['Sparkle Passion', 'serif'],
          
          // FIXED: Changed key from 'sparkle:' to 'monograph:' 
          // This maps to class="font-monograph"
          monograph: ['Monograph', 'serif']
        }
      }
    }
  }
</script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="parallax-bg"></div>
<div class="parallax-mid"></div>

<section id= "home" class="text-center text-white py-20 reveal-on-scroll">
   <h1 class="text-9xl md:text-8xl font-normal tracking-normal uppercase drop-shadow-lg font-monograph">
        English Final Summative
    </h1>

    <p class="text-4xl md:text-4xl font-bold tracking-wide drop-shadow-lg font-sparkle">
        A collection of my learning, growth, and writing development throughout Grade 9 English.
    </p>
</section>

<header class="main-header">

    <h2 class="header-title">English Portfolio</h2>

    <nav class="nav-bar mt-4">
        <div class="flex justify-center gap-3 flex-wrap">

            <a href="index.html"
                class="px-5 py-2 rounded-full bg-white/10 hover:bg-cyan-400/30 backdrop-blur-md transition">
                Home
            </a>

            <a href="impact.html"
                class="px-5 py-2 rounded-full bg-white/10 hover:bg-cyan-400/30 backdrop-blur-md transition">
                Impact
            </a>

            <a href="skills.html"
                class="px-5 py-2 rounded-full bg-white/10 hover:bg-cyan-400/30 backdrop-blur-md transition">
                Skills
            </a>

            <a href="growth.html"
            class="px-5 py-2 rounded-full bg-white/10 hover:bg-cyan-400/30 backdrop-blur-md transition">
                Growth
            </a>

        </div>
    </nav>

</header>

<main class="max-w-6xl mx-auto px-6 flex flex-col gap-16 min-h-[60vh]">
    
<section id="skills" class="tile reveal-on-scroll bg-white/90 p-10">
    <h2 class="text-3xl font-bold mb-4">Skills</h2>
    <p>Transferable skills from English...</p>
</section>

</main>

<script>
window.addEventListener('scroll', () => {
    const header = document.querySelector('.main-header');
    header.classList.toggle('shrink', window.scrollY > 50);

    const scrollY = window.scrollY;

    document.querySelector('.parallax-bg').style.transform =
        `translateY(${scrollY * 0.15}px) scale(1.2)`;

    document.querySelector('.parallax-mid').style.transform =
        `translateY(${scrollY * 0.3}px)`;
});

// reveal
const reveal = document.querySelectorAll('.reveal-on-scroll');

const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
        if (e.isIntersecting) {
            e.target.classList.add('is-visible');
        }
    });
});

reveal.forEach(el => observer.observe(el));

// APPLE-STYLE TILT + MAGNETIC + SMOOTH
const tiles = document.querySelectorAll('.tile');

tiles.forEach(tile => {

    let tx = 0, ty = 0;
    let cx = 0, cy = 0;

    tile.addEventListener('mousemove', (e) => {

        const r = tile.getBoundingClientRect();
        const x = e.clientX - r.left;
        const y = e.clientY - r.top;

        const cx2 = r.width / 2;
        const cy2 = r.height / 2;

        tx = ((y - cy2) / cy2) * 10;
        ty = ((x - cx2) / cx2) * 10;

    });

    tile.addEventListener('mouseleave', () => {
        tx = 0;
        ty = 0;
    });

    function animate() {

        cx += (tx - cx) * 0.08;
        cy += (ty - cy) * 0.08;

        tile.style.transform =
            `perspective(1200px)
             rotateX(${cx}deg)
             rotateY(${cy}deg)
             translateZ(0px)`;

        requestAnimationFrame(animate);
    }

    animate();
});
</script>

</body>
</html>
